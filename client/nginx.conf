server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  gzip on;
  gzip_types text/css application/javascript application/json;
  gzip_min_length 1024;

  # Proxy the API through the same origin as the app, so the browser never
  # makes a cross-origin request and CORS stays out of the picture in the
  # compose deployment.
  location /api/ {
    proxy_pass http://api:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # A 10k-record bulk upload is ~2.5MB; nginx's 1MB default would reject it.
    client_max_body_size 32m;
    proxy_read_timeout 120s;
  }

  location /health {
    proxy_pass http://api:4000/health;
  }

  # Hashed build assets are immutable — cache them hard.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Single-page app: unknown paths are client routes, not 404s.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
